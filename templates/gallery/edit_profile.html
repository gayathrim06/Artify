{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile | Artify</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #d4af37;
            --bg-dark: #070707;
            --glass-bg: rgba(10, 10, 10, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f4f4f4;
            --text-muted: #a0a0a0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: ""; position: absolute; top:0; left:0; right:0; bottom:0;
            background: url('{% static "images/hero_bg.png" %}') no-repeat center center;
            background-size: cover; filter: brightness(0.2) blur(8px); z-index: -1;
        }

        .edit-profile-container {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            padding: 50px;
            border-radius: 20px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            margin: 40px 0;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group { margin-bottom: 25px; }
        
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
        }
        
        input[type="text"], textarea, input[type="file"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 12px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }
        
        input:focus, textarea:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
        }
        
        .current-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 2px solid var(--primary);
        }

        .btn-primary {
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .btn-primary:hover {
            transform: translateY(-3px); box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .header h2 span {
            color: var(--primary);
        }
    </style>
</head>
<body>

    <div class="edit-profile-container">
        <h2 class="header" style="font-size: 32px; font-weight: 800; margin-bottom: 30px; text-align: center;">Edit <span>Profile</span></h2>
        
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Profile Picture</label>
                {% if profile.profile_pic %}
                    <img src="{{ profile.profile_pic.url }}" class="current-pic" alt="Current Profile Pic">
                {% endif %}
                <input type="file" name="profile_pic" accept="image/*">
            </div>
            
            <div class="form-group">
                <label>Biography</label>
                <textarea name="bio" rows="5" placeholder="Tell your collectors about your artistic journey...">{{ profile.bio }}</textarea>
            </div>
            
            <div style="display: flex; gap: 15px; margin-top: 40px;">
                <button type="submit" class="btn-primary" style="flex: 1; padding: 15px;">Save Profile</button>
                <a href="{% url 'seller' %}" class="btn-secondary" style="flex: 1; padding: 15px; text-align: center; text-decoration: none; display: flex; align-items: center; justify-content: center;">Cancel</a>
            </div>
        </form>
    </div>

</body>
</html>
