{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Artify</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d4af37;
            --bg-dark: #070707;
            --glass-bg: rgba(10, 10, 10, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f4f4f4;
            --text-muted: #a0a0a0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        /* Background blur effects */
        body::before {
            content: ""; position: absolute; width: 40vw; height: 40vw;
            background: var(--primary); filter: blur(150px); opacity: 0.15;
            border-radius: 50%; top: -10vw; left: -10vw; z-index: -1;
        }
        
        .login-box {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeUp 0.8s ease-out;
            position: relative;
            z-index: 10;
        }
        .logo { font-size: 32px; font-weight: 800; margin-bottom: 30px; letter-spacing: 2px; text-transform: uppercase; }
        .logo span { color: var(--primary); }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 14px; margin-bottom: 8px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .input-group input { 
            width: 100%; padding: 14px 18px; border-radius: 12px;
            background: rgba(255,255,255,0.05); color: #fff;
            border: 1px solid var(--glass-border); font-size: 16px;
            font-family: 'Outfit', sans-serif;
            outline: none; transition: border 0.3s;
        }
        .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1); }
        .btn-primary {
            width: 100%; padding: 16px; background: var(--primary); color: #000;
            border: none; border-radius: 12px; font-size: 16px; font-weight: 700;
            font-family: 'Outfit', sans-serif;
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.3s ease; margin-top: 10px;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2); }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="login-box">
        <a href="/" style="text-decoration: none; color: #fff;"><div class="logo">Arti<span>fy</span></div></a>
        
        {% if messages %}
            {% for message in messages %}
                <div style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #ef4444; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; text-align: left; animation: fadeUp 0.3s ease-out;">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" required placeholder="Enter your username">
            </div>
            <div class="input-group">
                <label>Password</label>
                <div style="position: relative; display: flex; align-items: center;">
                    <input type="password" name="password" id="id_password" required placeholder="Enter your password" style="width: 100%; padding-right: 45px;">
                    <button type="button" onclick="togglePassword()" style="position: absolute; right: 15px; background: none; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; outline: none; transition: color 0.3s; padding: 0; width: auto; margin: 0; box-shadow: none;">
                        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn-primary">Sign In</button>
        </form>
        <p style="margin-top: 25px; font-size: 14px; color: var(--text-muted);">
            Don't have an account? <a href="/register/" style="color: var(--primary); text-decoration: none; font-weight: 600;">Register here</a>
        </p>
    </div>

    <script>
        function togglePassword() {
            const pwdInput = document.getElementById('id_password');
            const eyeIcon = document.getElementById('eye-icon');
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                pwdInput.type = 'password';
                eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        }
    </script>
</body>
</html>
