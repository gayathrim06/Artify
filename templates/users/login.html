{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Artify</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d4af37;
            --bg-dark: #070707;
            --glass-bg: rgba(10, 10, 10, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f4f4f4;
            --text-muted: #a0a0a0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        /* Background blur effects */
        body::before {
            content: ""; position: absolute; width: 40vw; height: 40vw;
            background: var(--primary); filter: blur(150px); opacity: 0.15;
            border-radius: 50%; top: -10vw; left: -10vw; z-index: -1;
        }
        
        .login-box {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeUp 0.8s ease-out;
            position: relative;
            z-index: 10;
        }
        .logo { font-size: 32px; font-weight: 800; margin-bottom: 30px; letter-spacing: 2px; text-transform: uppercase; }
        .logo span { color: var(--primary); }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 14px; margin-bottom: 8px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .input-group input { 
            width: 100%; padding: 14px 18px; border-radius: 12px;
            background: rgba(255,255,255,0.05); color: #fff;
            border: 1px solid var(--glass-border); font-size: 16px;
            font-family: 'Outfit', sans-serif;
            outline: none; transition: border 0.3s;
        }
        .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1); }
        .btn-primary {
            width: 100%; padding: 16px; background: var(--primary); color: #000;
            border: none; border-radius: 12px; font-size: 16px; font-weight: 700;
            font-family: 'Outfit', sans-serif;
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.3s ease; margin-top: 10px;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2); }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="login-box">
        <a href="/" style="text-decoration: none; color: #fff;"><div class="logo">Arti<span>fy</span></div></a>
        <form method="POST">
            {% csrf_token %}
            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" required placeholder="Enter your username">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn-primary">Sign In</button>
        </form>
        <p style="margin-top: 25px; font-size: 14px; color: var(--text-muted);">
            Don't have an account? <a href="/register/" style="color: var(--primary); text-decoration: none; font-weight: 600;">Register here</a>
        </p>
    </div>
</body>
</html>
