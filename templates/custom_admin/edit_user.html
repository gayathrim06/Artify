{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User | Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #d4af37; --bg-dark: #070707; --glass-bg: rgba(10, 10, 10, 0.7); --glass-border: rgba(255, 255, 255, 0.08); --text-main: #f4f4f4; --text-muted: #a0a0a0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg-dark); color: var(--text-main); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .edit-container { background: var(--glass-bg); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); padding: 40px; border-radius: 20px; width: 100%; max-width: 500px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        h2 { font-size: 28px; font-weight: 800; margin-bottom: 30px; text-align: center; }
        h2 span { color: var(--primary); }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        input, select { width: 100%; padding: 14px 18px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 12px; color: #fff; font-size: 16px; font-family: 'Outfit', sans-serif; outline: none; transition: border 0.3s; }
        input:focus, select:focus { border-color: var(--primary); }
        .btn-group { display: flex; gap: 15px; margin-top: 30px; }
        .btn { flex: 1; padding: 14px; border-radius: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; border: none; transition: 0.3s; text-decoration: none; text-align: center; font-size: 14px; }
        .btn-save { background: var(--primary); color: #000; }
        .btn-cancel { background: transparent; border: 1px solid var(--glass-border); color: #fff; }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }
    </style>
</head>
<body>
    <div class="edit-container">
        <h2>Edit User: <span>@{{ user_to_edit.username }}</span></h2>
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>First Name</label>
                <input type="text" name="first_name" value="{{ user_to_edit.first_name }}" required>
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" name="last_name" value="{{ user_to_edit.last_name }}" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" value="{{ user_to_edit.email }}" required>
            </div>
            <div class="form-group">
                <label>Account Role</label>
                <select name="role">
                    <option value="buyer" {% if user_to_edit.profile.role == 'buyer' %}selected{% endif %}>Buyer</option>
                    <option value="seller" {% if user_to_edit.profile.role == 'seller' %}selected{% endif %}>Seller</option>
                </select>
            </div>
            <div class="btn-group">
                <button type="submit" class="btn btn-save">Save Changes</button>
                <a href="{% url 'dashboard' %}" class="btn btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
